services:
  - type: web
    name: stock-analyzer-api
    runtime: python
    buildCommand: pip install -r web_backend/requirements.txt
    startCommand: uvicorn web_backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false